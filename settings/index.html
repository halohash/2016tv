<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: #1e1e1e;
  padding: 24px;
  border-radius: 12px;
  width: 320px;
  box-sizing: border-box;
}

input {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  margin-bottom: 12px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.current {
  margin-top: 12px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>
<body>
<div class="box">
  <h2>Settings</h2>

  <a href="innertube">InnerTube Endpoint</a>
  <a href="profile">Profile</a>
</div>
</div>

</body>
</html>
